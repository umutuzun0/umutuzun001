<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX OS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#07070a;--s1:#0f0f14;--s2:#17171e;--s3:#21212a;
  --gold:#c9a84c;--gl:#e2c677;--gd:rgba(201,168,76,0.1);--gb:rgba(201,168,76,0.22);
  --tx:#edeae4;--t2:#8a8680;--t3:#3e3d3a;
  --gr:#5dba7e;--grd:rgba(93,186,126,0.08);--grb:rgba(93,186,126,0.25);
  --bl:#5ba3d9;--bld:rgba(91,163,217,0.09);--blb:rgba(91,163,217,0.25);
  --rd:#e0705d;--rdd:rgba(224,112,93,0.09);
  --br:rgba(255,255,255,0.055);--br2:rgba(255,255,255,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;height:100%;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh;}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.5s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-title{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:300;color:var(--gold);letter-spacing:0.12em;}
.splash-sub{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--t2);margin-top:8px;}
.splash-bar{width:120px;height:1px;background:var(--br2);margin-top:32px;overflow:hidden;border-radius:1px;}
.splash-fill{height:100%;background:var(--gold);width:0%;transition:width 1.8s ease;}

/* LAYOUT */
.app{flex:1;display:flex;flex-direction:column;padding-bottom:76px;overflow-y:auto;}

/* TOP BAR */
.topbar{padding:20px 22px 12px;position:sticky;top:0;background:rgba(7,7,10,0.95);backdrop-filter:blur(20px);z-index:50;border-bottom:1px solid var(--br);}
.tb-row{display:flex;align-items:center;justify-content:space-between;}
.tb-left{display:flex;flex-direction:column;}
.tb-date{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;}
.tb-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--tx);}
